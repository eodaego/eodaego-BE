<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>놀이기구 관리 - 어대고 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css"/>
</head>
<body class="min-h-screen bg-base-200">
<div th:replace="~{admin/fragments/layout :: nav(activePage='amusement-rides')}"></div>
<div class="p-8">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">놀이기구 관리</h2>
    <a th:href="@{/admin/facility/amusement-rides/new}" class="btn btn-primary btn-sm">놀이기구 등록</a>
  </div>
  <div class="overflow-x-auto bg-base-100 rounded-box shadow">
    <table class="table">
      <thead>
      <tr>
        <th>이름</th>
        <th>위치</th>
        <th>설명</th>
        <th>운영 상태</th>
        <th>수정일시</th>
        <th></th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="ride : ${rides}">
        <td th:text="${ride.name()}"></td>
        <td th:text="${ride.location()}"></td>
        <td th:text="${ride.description()}"></td>
        <td>
          <span class="badge" th:classappend="${ride.active()} ? 'badge-success' : 'badge-ghost'"
                th:text="${ride.active()} ? '운영중' : '중지'"></span>
        </td>
        <td th:text="${ride.updatedAt()}"></td>
        <td class="flex gap-2">
          <a th:href="@{'/admin/facility/amusement-rides/' + ${ride.id()} + '/edit'}" class="btn btn-outline btn-xs">수정</a>
          <form th:action="@{'/admin/facility/amusement-rides/' + ${ride.id()} + '/delete'}" method="post">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline btn-error btn-xs">삭제</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
