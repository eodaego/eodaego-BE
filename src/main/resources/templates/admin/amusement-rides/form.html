<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${mode == 'create'} ? '놀이기구 등록 - 어대고 관리자' : '놀이기구 수정 - 어대고 관리자'"></title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css"/>
</head>
<body class="min-h-screen bg-base-200">
<div th:replace="~{admin/fragments/layout :: nav(activePage='amusement-rides')}"></div>
<div class="p-8">
  <h2 class="text-xl font-bold mb-4" th:text="${mode == 'create'} ? '놀이기구 등록' : '놀이기구 수정'"></h2>
  <form th:action="${mode == 'create'} ? @{/admin/facility/amusement-rides} : @{'/admin/facility/amusement-rides/' + ${rideId}}"
        th:object="${request}" method="post" class="card bg-base-100 shadow-xl p-6 max-w-lg">
    <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="form-control mb-3">
      <label class="label"><span class="label-text">이름</span></label>
      <input type="text" th:field="*{name}" class="input input-bordered"/>
      <span class="text-error text-sm" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>
    <div class="form-control mb-3">
      <label class="label"><span class="label-text">설명</span></label>
      <textarea th:field="*{description}" class="textarea textarea-bordered"></textarea>
    </div>
    <div class="form-control mb-3">
      <label class="label"><span class="label-text">위치</span></label>
      <input type="text" th:field="*{location}" class="input input-bordered"/>
    </div>
    <div class="form-control mb-4">
      <label class="label cursor-pointer justify-start gap-2">
        <input type="checkbox" th:field="*{active}" class="checkbox"/>
        <span class="label-text">운영 중</span>
      </label>
    </div>
    <button type="submit" class="btn btn-primary">저장</button>
  </form>
</div>
</body>
</html>
