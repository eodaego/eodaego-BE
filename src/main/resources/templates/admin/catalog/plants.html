<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>식물도감 조회 - 어대고 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css"/>
</head>
<body class="min-h-screen bg-base-200">
<div th:replace="~{admin/fragments/layout :: nav(activePage='plants')}"></div>
<div class="p-8">
  <h2 class="text-xl font-bold mb-4">식물도감 조회</h2>
  <div class="overflow-x-auto bg-base-100 rounded-box shadow">
    <table class="table">
      <thead>
      <tr>
        <th>이름</th>
        <th>설명</th>
        <th>등록일</th>
        <th>수정일시</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="plant : ${plants}">
        <td th:text="${plant.name()}"></td>
        <td th:text="${plant.description()}"></td>
        <td th:text="${plant.registeredDate()}"></td>
        <td th:text="${plant.updatedAt()}"></td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
