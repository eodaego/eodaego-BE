<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>크롤링 스케줄 관리 - 어대고 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css"/>
</head>
<body class="min-h-screen bg-base-200">
<div th:replace="~{admin/fragments/layout :: nav(activePage='crawling-schedules')}"></div>
<div class="p-8">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">크롤링 스케줄 관리</h2>
    <a th:href="@{/admin/crawling/schedules/new}" class="btn btn-primary btn-sm">스케줄 등록</a>
  </div>
  <div class="overflow-x-auto bg-base-100 rounded-box shadow">
    <table class="table">
      <thead>
      <tr>
        <th>작업 ID</th>
        <th>트리거 유형</th>
        <th>트리거 설정값</th>
        <th>활성화</th>
        <th>수정일시</th>
        <th></th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="schedule : ${schedules}">
        <td th:text="${schedule.jobId()}"></td>
        <td th:text="${schedule.triggerType()}"></td>
        <td th:text="${schedule.triggerConfig()}"></td>
        <td>
          <span class="badge" th:classappend="${schedule.active()} ? 'badge-success' : 'badge-ghost'"
                th:text="${schedule.active()} ? '활성' : '비활성'"></span>
        </td>
        <td th:text="${schedule.updatedAt()}"></td>
        <td class="flex gap-2">
          <a th:href="@{'/admin/crawling/schedules/' + ${schedule.id()} + '/edit'}" class="btn btn-outline btn-xs">수정</a>
          <form th:action="@{'/admin/crawling/schedules/' + ${schedule.id()} + '/delete'}" method="post">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline btn-error btn-xs">삭제</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
