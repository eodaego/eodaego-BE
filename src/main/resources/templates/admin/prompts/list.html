<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>프롬프트 템플릿 관리 - 어대고 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css"/>
</head>
<body class="min-h-screen bg-base-200">
<div th:replace="~{admin/fragments/layout :: nav(activePage='prompts')}"></div>
<div class="p-8">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">프롬프트 템플릿 관리</h2>
    <a th:href="@{/admin/prompts/new}" class="btn btn-primary btn-sm">템플릿 등록</a>
  </div>
  <div class="overflow-x-auto bg-base-100 rounded-box shadow">
    <table class="table">
      <thead>
      <tr>
        <th>이름</th>
        <th>모델</th>
        <th>용도</th>
        <th>활성 여부</th>
        <th>수정일시</th>
        <th></th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="prompt : ${prompts}">
        <td th:text="${prompt.name()}"></td>
        <td th:text="${prompt.model()}"></td>
        <td th:text="${prompt.purpose()}"></td>
        <td>
          <span class="badge" th:classappend="${prompt.active()} ? 'badge-success' : 'badge-ghost'"
                th:text="${prompt.active()} ? '활성' : '비활성'"></span>
        </td>
        <td th:text="${prompt.updatedAt()}"></td>
        <td class="flex gap-2">
          <form th:if="${!prompt.active()}" th:action="@{'/admin/prompts/' + ${prompt.id()} + '/activate'}" method="post">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline btn-success btn-xs">활성화</button>
          </form>
          <a th:href="@{'/admin/prompts/' + ${prompt.id()} + '/edit'}" class="btn btn-outline btn-xs">수정</a>
          <form th:action="@{'/admin/prompts/' + ${prompt.id()} + '/delete'}" method="post">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline btn-error btn-xs">삭제</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
